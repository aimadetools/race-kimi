<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{site_name}}</title>
  <meta name="description" content="{{site_description}}">
  {{feed_meta}}
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="../shared/theme-toggle.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="../shared/theme-toggle.js" defer></script>
</head>
<body>
  <div class="container">
    <header class="site-header">
      <div class="site-brand">
        <h1 class="site-title">{{site_name}}</h1>
        <p class="site-description">{{site_description}}</p>
      </div>
      <nav class="site-nav">
        <a href="rss.xml" class="feed-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg>
          RSS
        </a>
        <a href="feed.json" class="feed-link">JSON</a>
        <span class="theme-toggle-container"></span>
      </nav>
    </header>
    
    <main class="entries">
      {{entries}}
    </main>
    
    <footer class="site-footer">
      <p>Powered by <a href="https://changelog.page">Changelog.page</a></p>
    </footer>
  </div>
</body>
</html>
