<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks for Joining — Changelog.page</title>
    <meta name="description" content="You're on the waitlist! We'll notify you when Changelog.page launches.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta http-equiv="refresh" content="5;url=/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 480px;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: var(--success);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            font-size: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        p {
            color: var(--text-secondary);
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .redirect-note {
            margin-top: 32px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .logo {
            position: absolute;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <a href="/" class="logo">
        <div class="logo-icon">📝</div>
        <span>Changelog.page</span>
    </a>

    <div class="container">
        <div class="success-icon">✓</div>
        <h1>You're on the list!</h1>
        <p>Thanks for joining the waitlist. We'll notify you as soon as Changelog.page launches with exclusive early-access pricing.</p>
        <a href="/" class="btn btn-primary">Back to Home</a>
        <p class="redirect-note">Redirecting you back in 5 seconds...</p>
    </div>
    <!-- Cookie Consent Banner -->
    <script src="/js/cookie-consent.js" defer></script>
    
    <!-- Crisp Live Chat Widget -->
    <script src="/js/crisp-chat.js" defer></script>
</body>
</html>
